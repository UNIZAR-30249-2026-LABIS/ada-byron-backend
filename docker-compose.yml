version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: adabyron_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: adabyron
      POSTGRES_USER: adabyron_user
      POSTGRES_PASSWORD: adabyron_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U adabyron_user -d adabyron" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: adabyron_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@adabyron.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
